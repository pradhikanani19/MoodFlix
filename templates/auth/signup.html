<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sign Up – MoodFlix</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
</head>
<body class="auth-page">
<div class="blob b1"></div><div class="blob b2"></div>
<div class="auth-wrap">
  <a href="{{ url_for('main.landing') }}" class="auth-logo">🎬 MoodFlix</a>
  <div class="auth-card">
    <h2>Create account ✨</h2>
    <p>Begin your cinematic journey today</p>
    <div id="err" class="auth-err" style="display:none"></div>
    <div class="form-group"><label>Username</label><input type="text" id="username" placeholder="Choose a username"></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="your@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Min 6 characters"></div>
    <button class="btn-submit" id="signupBtn" onclick="doSignup()">Create Account →</button>
    <p class="auth-switch">Already a member? <a href="{{ url_for('auth.login') }}">Sign in</a></p>
  </div>
</div>
<script>
async function doSignup(){
  const btn=document.getElementById('signupBtn'),err=document.getElementById('err');
  btn.textContent='Creating...';btn.disabled=true;err.style.display='none';
  try{
    const res=await fetch('/auth/signup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('username').value,email:document.getElementById('email').value,password:document.getElementById('password').value})});
    const data=await res.json();
    if(data.redirect){window.location.href=data.redirect;}
    else{err.textContent=data.error||'Signup failed';err.style.display='block';}
  }catch(e){err.textContent='Something went wrong';err.style.display='block';}
  btn.textContent='Create Account →';btn.disabled=false;
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
</script>
</body>
</html>
